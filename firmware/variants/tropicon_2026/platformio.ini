; ─────────────────────────────────────────────
; Badge Tropicon 2026 — ESP32-S3 + Meshtastic
; ─────────────────────────────────────────────

[platformio]
default_envs = tropicon2026

; It inherits the ESP32-S3 base from the Meshtastic core.
[env:tropicon2026]
extends          = esp32s3_base          ; base defined in Memetastic/platformio.ini
board            = esp32-s3-devkitc-1
framework        = arduino

; Flash y PSRAM
board_build.flash_size  = 8MB
board_upload.flash_size = 8MB
board_build.arduino.memory_type = qio_opi   ; PSRAM OPI for S3

; Flags: activate private hardware and point to variant folder for headers
build_flags =
    ${esp32s3_base.build_flags}
    -D PRIVATE_HW
    -I variants/tropicon_2026

; Own dependencies (Meshtastic has its own in its ini)
lib_deps =
    ${esp32s3_base.lib_deps}
    ;Future sensors
    ;adafruit/Adafruit BME280 Library @ ^2.2.4
    ;adafruit/Adafruit Unified Sensor  @ ^1.1.14

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
upload_protocol = esptool